<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceX Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
        <div class="logo">
            <img src="photo/share__1_-removebg-preview.png" alt="Space Logo" class="space-logo">
        </div>
        <ul class="nav-link">
            <li><a href="#">VEHICLES</a></li>
            <li><a href="#">HUMAN SPACEFLIGHT</a></li>

  <main class="hero">

        <video autoplay loop muted playsinline class="bg-video">

        </video>
        <div class="content">
            <p>May 22, 2026</p>

        </div>
    </section>

    <section class="screen-section">
        <video autoplay loop muted playsinline class="bg-video">
            <source src="photo/Mobile_v4_HB_e1d2eda88f (1).mp4" type="video/mp4">
        </video>
        <div class="content">
            <p>Upcoming Mission</p>
            <h1>Starlink Mission Launch</h1>
        </div>
